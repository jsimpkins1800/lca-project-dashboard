const SYSTEM_ACTIONS=[
  {project:"Lower Bucks Hospital",action:"Create project folder — no 26-xxx folder exists despite active proposal, W-9 submitted, and vendor system setup underway",urgent:true,type:"missing_folder"},
  {project:"Fort Carson 24-101",action:"Update tracker — Eurofins COCs received for 5621, 5623, 5624 Cherbourg Circle (were Not Started, now Lab Submitted)",urgent:false,type:"tracker_update"},
  {project:"Grand Forks 26-032",action:"Create project tracker — folder exists, active BBC email discussion about ACM testing contract, but no tracker xlsx found",urgent:false,type:"missing_tracker"},
  {project:"West Point LBP Stabilization",action:"Create project folder — PSA executed by T. Gonzalez (BBC), no dedicated project folder found for this scope",urgent:false,type:"missing_folder"}
];

const PHASE_MAP={'WO Received':'setup','Estimate':'setup','PO Received':'setup','Inspector Assigned':'field','Inspection Complete':'field','Lab Submitted':'field','Report Created':'report','Report Reviewed':'report','Report Sent':'report','Invoiced':'complete','Closed':'complete','Not Started':'none'};
const PHASE_COLORS={setup:'#3b82f6',field:'#f59e0b',report:'#8b5cf6',complete:'#10b981',none:'#e2e8f0'};
const PHASE_ORDER=['setup','field','report','complete'];
const PILL={'Not Started':'background:#f1f5f9;color:#64748b','WO Received':'background:#dbeafe;color:#1d4ed8','PO Received':'background:#bfdbfe;color:#1e40af','Inspector Assigned':'background:#fef3c7;color:#b45309','Inspection Complete':'background:#fed7aa;color:#c2410c','Lab Submitted':'background:#ffedd5;color:#ea580c','Report Created':'background:#ede9fe;color:#6d28d9','Report Reviewed':'background:#ddd6fe;color:#5b21b6','Report Sent':'background:#c7d2fe;color:#3730a3','Invoiced':'background:#d1fae5;color:#065f46','Closed':'background:#a7f3d0;color:#064e3b'};
let currentProj=null;

document.getElementById('backBtn').addEventListener('click',()=>{
  document.getElementById('listView').style.display='block';
  document.getElementById('detailView').style.display='none';
  currentProj=null;
});
document.getElementById('projBody').addEventListener('click',e=>{
  const r=e.target.closest('tr[data-id]');if(r)showDetail(r.dataset.id);
});

function showDetail(projId){
  const proj=PROJECTS.find(p=>p.id===projId);if(!proj)return;
  currentProj=proj;
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('detailTitle').textContent=proj.id+' – '+proj.name;
  const pct=proj.total>0?Math.round(proj.invoiced/proj.total*100):0;
  const specialStat=proj.acm_count?`<div class="d-stat red"><div class="d-stat-n">${proj.acm_count}</div><div class="d-stat-l">ACM Detected</div></div>`:proj.exceed_count?`<div class="d-stat red"><div class="d-stat-n">${proj.exceed_count}</div><div class="d-stat-l">Exceed Lead AL</div></div>`:'';
  document.getElementById('detailMeta').innerHTML=`<div class="d-stat"><div class="d-stat-n">${proj.total||'–'}</div><div class="d-stat-l">Total Units</div></div><div class="d-stat amb"><div class="d-stat-n">${proj.in_progress}</div><div class="d-stat-l">In Progress</div></div><div class="d-stat grn"><div class="d-stat-n">${proj.invoiced}</div><div class="d-stat-l">Invoiced</div></div><div class="d-stat"><div class="d-stat-n">${pct}%</div><div class="d-stat-l">Complete</div></div>${specialStat}`;
  const area=document.getElementById('detailTrackerArea');
  if(proj.needs_tracker){area.innerHTML=`<div class="no-tracker-msg" style="margin:0 12px 14px"><strong>⚠ No project tracker found</strong><br>Folder exists for Grand Forks 26-032 but no .xlsx tracker has been created yet.</div>`;return;}
  if(!proj.units.length){area.innerHTML=`<div style="padding:16px 12px;color:#94a3b8;font-style:italic">No units in tracker yet.</div>`;return;}
  const hasAcm=proj.units.some(u=>u.acm!==undefined);
  const pill=s=>`<span class="stage-pill" style="${PILL[s]||'background:#f1f5f9;color:#64748b'}">${s||'–'}</span>`;
  function streetOf(a){const w=a.trim().split(/\s+/);if(w.length<=1)return a;const sx=['street','drive','way','road','avenue','place','circle','court','lane','blvd','ave','dr','st','rd'];for(let i=w.length-1;i>=0;i--){if(sx.includes(w[i].toLowerCase().replace(/[.,]/g,''))){return w.slice(Math.max(0,i-1)).join(' ');}}return w.slice(-2).join(' ');}
  const grps={},gOrd=[];for(const u of proj.units){const s=streetOf(u.address);if(!grps[s]){grps[s]=[];gOrd.push(s);}grps[s].push(u);}
  const doGroup=gOrd.length>1&&gOrd.length<proj.units.length;
  let rn=0,tb='';
  for(const st of gOrd){
    if(doGroup)tb+=`<tr style="background:#eef2ff"><td colspan="12" style="padding:5px 10px;font-size:10px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.4px">${st} <span style="font-weight:400;color:#64748b">${grps[st].length} unit${grps[st].length>1?'s':''}</span></td></tr>`;
    for(const u of grps[st]){rn++;tb+=`<tr><td class="num-cell">${rn}</td><td class="addr-cell">${u.address}</td><td style="color:#475569">${u.service||''}</td><td>${pill(u.stage)}</td><td>${u.inspector||''}</td><td>${u.inspection_date||''}</td><td style="font-size:10px;color:#475569">${u.lab_order||''}</td>${hasAcm?`<td>${u.acm==='Yes'?'<span class="acm-yes">Yes</span>':u.acm==='No'?'<span class="acm-no">No</span>':''}</td>`:''}<td style="font-size:10px">${u.report_created||''}</td><td style="font-size:10px">${u.report_sent||''}</td><td style="font-size:10px;font-weight:${u.invoiced?700:400};color:${u.invoiced?'#059669':''}">${u.invoiced||''}</td><td class="note-cell">${(u.notes||'').replace(/</g,'&lt;')}</td></tr>`;}
  }
  area.innerHTML=`<div class="tracker-wrap"><table class="unit-tbl"><thead><tr><th style="width:28px">#</th><th>Address</th><th>Service</th><th>Stage</th><th>Inspector</th><th>Inspection Date</th><th>Lab Order #</th>${hasAcm?'<th>ACM</th>':''}<th>Rpt Created</th><th>Rpt Sent</th><th>Invoiced</th><th>Notes</th></tr></thead><tbody>${tb}</tbody></table></div>`;
}

// Render project table
const sorted=[...PROJECTS].sort((a,b)=>{
  if(a.needs_tracker&&!b.needs_tracker)return 1;if(b.needs_tracker&&!a.needs_tracker)return -1;
  if(a.total===0&&b.total>0)return 1;if(b.total===0&&a.total>0)return -1;
  return b.in_progress-a.in_progress||b.total-a.total;
});
document.getElementById('sProj').textContent=PROJECTS.filter(p=>p.total>0||p.needs_tracker).length;
document.getElementById('sIP').textContent=PROJECTS.reduce((s,p)=>s+p.in_progress,0);
document.getElementById('sInv').textContent=PROJECTS.reduce((s,p)=>s+p.invoiced,0);
document.getElementById('projBody').innerHTML=sorted.map(proj=>{
  const pct=proj.total>0?Math.round(proj.invoiced/proj.total*100):0;
  const phase=PHASE_MAP[proj.furthest_stage]||'none',pIdx=PHASE_ORDER.indexOf(phase);
  const segs=PHASE_ORDER.map((ph,i)=>{const r=pIdx>=i&&phase!=='none',c=pIdx===i&&phase!=='none';return`<div class="mini-seg" style="background:${r?PHASE_COLORS[ph]:'#e9ecf0'};opacity:${r&&!c?.45:1}"></div>`;}).join('');
  const specialChip=proj.acm_count?`<span class="chip warn">ACM: ${proj.acm_count}</span>`:proj.exceed_count?`<span class="chip warn">⚠ ${proj.exceed_count} Exceed AL</span>`:proj.needs_tracker?`<span class="chip flag">⚠ No tracker</span>`:'';
  const stageLabel=proj.needs_tracker?'No tracker — create one':proj.total===0?'No units yet':proj.furthest_stage;
  return`<tr data-id="${proj.id}"><td><div class="proj-id">${proj.id}</div><div class="proj-name">${proj.name}</div></td><td><div class="mini-pipe">${segs}</div><div class="curr-stage">${stageLabel}</div></td><td><div class="chip-row">${proj.not_started>0?`<span class="chip ns">${proj.not_started} pending</span>`:''}${proj.in_progress>0?`<span class="chip ip">${proj.in_progress} active</span>`:''}${proj.invoiced>0?`<span class="chip inv">${proj.invoiced} invoiced</span>`:''}${proj.total===0&&!proj.needs_tracker?'<span class="chip ns">empty</span>':''}${specialChip}</div></td><td><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${PHASE_COLORS[phase]}"></div></div><div class="pct">${pct}% · ${proj.total} units</div></td><td><span class="row-arrow">›</span></td></tr>`;
}).join('');

// Render action items
document.getElementById('actionItems').innerHTML=SYSTEM_ACTIONS.map(a=>{
  const cls=a.urgent||a.type==='missing_folder'?'sys-red':'sys-amber';
  const tag=a.type==='missing_folder'?'New Folder Needed':a.type==='missing_tracker'?'No Tracker':'Tracker Update';
  return`<div class="ai-item ${cls}"><div class="ai-dot"></div><div><div class="ai-txt"><span class="ai-tag">${a.project}</span>${a.action}</div><div class="ai-from">[${tag}]</div></div></div>`;
}).join('');
</script>
